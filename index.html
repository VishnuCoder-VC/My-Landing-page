<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
</head>

<style>
    * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;

    }

    body {
        width: 100%;
        height: 100vh;
        /* background-image: url(); */
        background: linear-gradient(rgba(0, 0, 0, 0.897), rgba(0, 0, 0, 0.712)),
            url(/images/web.jpg);
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;

    }

    header {
        width: 100%;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    nav {
        width: 80%;
        display: flex;
        padding: 0 20px;
        justify-content: space-between;
        color: aliceblue;
    }

    .logo {

        font-size: 40px;
        letter-spacing: 3px;
        color: red;

    }

    nav button {
        width: 80px;
        height: 40px;
        font-size: large;
        background-color: rgb(199, 22, 22);
        color: aliceblue;
        border-radius: 10px;
    }

    .main {
        width: 100%;
        height: 80%;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 20px;
    }

    .main-h {
        font-size: 40px;
    }

    .pg {
        font-size: larger;
    }

    .btn {
        width: 200px;
        height: 50px;
        color: white;
        font-size: larger;
        display: block;
        margin: 40px auto;
        background-color: red;

    }

    .btn:hover {
        background-color: darkred;
        transform: scale(1.05);
        transition: 0.3s;
        border-radius: 10px;
    }

    .ppp {
        display: flex;
        font-size: larger;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        word-spacing: 3px;
        font-family: 'Courier New', Courier, monospace;
    }


    @media (max-width: 768px){
    .main-h{
        font-size: 28px;
        text-align: center;
    }

    .pg{
        text-align: center;
    }
}
</style>

<body>

    <header>
        <nav>
            <h2 class="logo">Vishnu</h2>
            <button type="submit">Sign up</button>
        </nav>
    </header>

    <main class="main">
        <h1 class="main-h">Learn Web Development in Simple Way</h1>
        <div class="ppp">

            <p class="pg">Start your journey as a developer and build </p>
            <p>projects step by step.</p>

        </div>
        <button class="btn">Get Started</button>
    </main>

</body>

</html>
